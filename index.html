<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#3f3a78">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<link rel="apple-touch-icon" href="icon-512.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Klassik">
<title>Klassik & Oper lernen</title>
<style>
:root{
  color-scheme: light;
  --bg:#f7f6f2; --card:#ffffff; --ink:#1c1b18; --muted:#6b6862; --line:#e7e4dc;
  --brand:#3f3a78; --brand-soft:#e7f0ea; --accent:#6a4c93; --gold:#c9a227;
  --good:#3f3a78; --good-soft:#e7f0ea; --bad:#b4452f; --bad-soft:#f6e6e1;
  --shadow:0 1px 2px rgba(0,0,0,.05),0 6px 18px rgba(0,0,0,.06);
  --radius:16px;
}
[data-theme="dark"]{
  color-scheme: dark;
  --bg:#121310; --card:#1c1e19; --ink:#ece9e2; --muted:#9c988e; --line:#30332c;
  --brand-soft:#1b271f; --good:#5aa483; --good-soft:#19241d; --bad:#e0826b; --bad-soft:#2c1b15;
  --shadow:0 1px 2px rgba(0,0,0,.5),0 8px 22px rgba(0,0,0,.45);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
.wrap{max-width:580px;margin:0 auto;padding:0 16px;
  padding-top:env(safe-area-inset-top);padding-bottom:calc(28px + env(safe-area-inset-bottom))}

/* header */
header{position:sticky;top:0;z-index:30;background:var(--bg);
  padding:calc(12px + env(safe-area-inset-top)) 0 8px;display:flex;align-items:center;gap:8px}
.brand{font-weight:800;font-size:20px;letter-spacing:-.4px;flex:1}
.brand b{color:var(--brand)}
.stat{font-size:13px;font-weight:700;background:var(--card);border:1px solid var(--line);
  padding:5px 9px;border-radius:999px;box-shadow:var(--shadow);white-space:nowrap}
.themebtn{font-size:16px;line-height:1;padding:8px 10px;border-radius:10px;
  color:var(--ink);background:var(--card);border:1px solid var(--line)}
.themebtn:active{transform:translateY(1px)}

/* tabs */
.tabs{display:flex;gap:8px;margin:10px 0 14px}
.tab{flex:1;text-align:center;padding:11px 4px;border-radius:14px;font-weight:700;font-size:13.5px;
  background:var(--card);border:1px solid var(--line);color:var(--muted);box-shadow:var(--shadow)}
.tab.on{color:#fff;border-color:transparent}
.tab:active{transform:translateY(1px)}

/* banner */
.banner{color:#fff;padding:16px;border-radius:var(--radius);margin-bottom:14px;
  box-shadow:var(--shadow);display:flex;align-items:center;gap:14px;cursor:pointer}
.banner .em{font-size:26px}
.banner b{font-size:16px;display:block}
.banner small{opacity:.92;font-size:12.5px;font-weight:600}
.banner .go{margin-left:auto;font-size:22px;opacity:.9}
.banner:active{transform:translateY(1px)}

/* category cards */
.sectit{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.6px;
  color:var(--muted);margin:18px 4px 8px}
.cat{display:flex;align-items:center;gap:13px;background:var(--card);border:1px solid var(--line);
  border-radius:14px;padding:13px 14px;margin-bottom:9px;box-shadow:var(--shadow);width:100%;text-align:left}
.cat:active{transform:translateY(1px)}
.cat .ic{font-size:22px;width:30px;text-align:center;flex:none}
.cat .tx{flex:1;min-width:0}
.cat .tx b{font-weight:700;font-size:15px;display:block}
.cat .tx small{color:var(--muted);font-size:12.5px}
.cat .ct{font-size:12px;font-weight:700;color:var(--muted);background:var(--bg);
  border:1px solid var(--line);border-radius:999px;padding:3px 9px;flex:none}

/* quiz */
.qhead{display:flex;align-items:center;gap:10px;margin:6px 0 12px}
.back{font-size:15px;font-weight:700;color:var(--muted);padding:6px 8px;border-radius:10px;border:1px solid var(--line);background:var(--card)}
.pbar{flex:1;height:9px;background:var(--line);border-radius:999px;overflow:hidden}
.pbar i{display:block;height:100%;width:0;background:var(--brand);transition:width .3s ease}
.qcount{font-size:12.5px;font-weight:700;color:var(--muted);white-space:nowrap}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px;box-shadow:var(--shadow);margin-bottom:14px}
.kicker{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:800;
  text-transform:uppercase;letter-spacing:.5px;color:#fff;background:var(--brand);
  padding:4px 9px;border-radius:999px;margin-bottom:12px}
.kicker.t-multi{background:var(--accent)} .kicker.t-est{background:var(--gold);color:#1c1b18}
.kicker.t-match{background:var(--accent)} .kicker.t-order{background:var(--accent)}
.kicker.t-gap{background:var(--gold);color:#1c1b18} .kicker.t-tf{background:var(--brand)}
.kicker.t-flip,.kicker.t-recall{background:var(--muted)}
.qtext{font-size:18px;font-weight:650;line-height:1.4;margin:0 0 4px}
.qsub{font-size:13px;color:var(--muted);margin:8px 0 2px}

/* options */
.opts{margin-top:14px;display:flex;flex-direction:column;gap:9px}
.opt{display:flex;align-items:center;gap:11px;width:100%;text-align:left;
  background:var(--bg);border:1.5px solid var(--line);border-radius:13px;padding:13px 14px;font-size:15px}
.opt .k{flex:none;width:25px;height:25px;border-radius:8px;border:1.5px solid var(--line);
  display:grid;place-items:center;font-weight:800;font-size:13px;color:var(--muted);background:var(--card)}
.opt:active{transform:translateY(1px)}
.opt.sel{border-color:var(--brand);background:var(--brand-soft)}
.opt.sel .k{background:var(--brand);color:#fff;border-color:var(--brand)}
.opt.correct{border-color:var(--good);background:var(--good-soft)}
.opt.correct .k{background:var(--good);color:#fff;border-color:var(--good)}
.opt.wrong{border-color:var(--bad);background:var(--bad-soft)}
.opt.wrong .k{background:var(--bad);color:#fff;border-color:var(--bad)}
.opt[disabled]{cursor:default}

/* true/false */
.tf{display:flex;gap:10px;margin-top:16px}
.tf button{flex:1;padding:18px 8px;border-radius:14px;border:1.5px solid var(--line);
  background:var(--bg);font-size:17px;font-weight:800}
.tf button .e{font-size:22px;display:block;margin-bottom:3px}
.tf button.correct{border-color:var(--good);background:var(--good-soft)}
.tf button.wrong{border-color:var(--bad);background:var(--bad-soft)}
.tf button.sel{border-color:var(--brand);background:var(--brand-soft)}

/* match */
.match{display:flex;gap:10px;margin-top:14px}
.mcol{flex:1;display:flex;flex-direction:column;gap:9px;min-width:0}
.mitem{border:1.5px solid var(--line);background:var(--bg);border-radius:12px;padding:12px 10px;
  font-size:13.5px;font-weight:600;text-align:left;position:relative;min-height:46px;display:flex;align-items:center}
.mitem.active{border-color:var(--brand);background:var(--brand-soft)}
.mitem.used{opacity:.55}
.mitem.correct{border-color:var(--good);background:var(--good-soft)}
.mitem.wrong{border-color:var(--bad);background:var(--bad-soft)}
.mbadge{position:absolute;top:-7px;right:-7px;width:22px;height:22px;border-radius:50%;
  background:var(--accent);color:#fff;font-size:12px;font-weight:800;display:grid;place-items:center;box-shadow:var(--shadow)}

/* order */
.order{margin-top:14px;display:flex;flex-direction:column;gap:9px}
.oitem{display:flex;align-items:center;gap:10px;border:1.5px solid var(--line);background:var(--bg);
  border-radius:12px;padding:11px 12px;font-size:14.5px;font-weight:600}
.oitem .num{flex:none;width:24px;height:24px;border-radius:7px;background:var(--card);border:1px solid var(--line);
  display:grid;place-items:center;font-weight:800;font-size:12px;color:var(--muted)}
.oitem .lbl{flex:1;min-width:0}
.oitem .arrows{display:flex;flex-direction:column;gap:2px}
.oitem .arrows button{font-size:13px;line-height:1;padding:3px 7px;border-radius:7px;border:1px solid var(--line);background:var(--card);font-weight:800}
.oitem.correct{border-color:var(--good);background:var(--good-soft)}
.oitem.wrong{border-color:var(--bad);background:var(--bad-soft)}

/* gap input */
.gapin{margin-top:16px;width:100%;font-size:17px;padding:13px 14px;border-radius:13px;
  border:1.5px solid var(--line);background:var(--bg);color:var(--ink);font-weight:600}
.gapin:focus{outline:none;border-color:var(--brand);background:var(--brand-soft)}

/* estimate slider */
.est{margin-top:18px}
.estval{text-align:center;font-size:30px;font-weight:800;color:var(--brand);margin-bottom:8px}
.estrange{width:100%;-webkit-appearance:none;appearance:none;height:8px;border-radius:999px;
  background:var(--line);outline:none}
.estrange::-webkit-slider-thumb{-webkit-appearance:none;width:30px;height:30px;border-radius:50%;
  background:var(--brand);border:3px solid var(--card);box-shadow:var(--shadow);cursor:pointer}
.estrange::-moz-range-thumb{width:30px;height:30px;border-radius:50%;background:var(--brand);border:3px solid var(--card);cursor:pointer}
.estminmax{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-top:6px;font-weight:600}

/* flip / recall */
.flipcard{margin-top:14px;border:1.5px solid var(--line);background:var(--bg);border-radius:14px;
  padding:20px 16px;min-height:90px;display:flex;align-items:center;justify-content:center;text-align:center;font-size:16px;font-weight:600}
.hintbox{margin-top:12px;font-size:13.5px;color:var(--muted);font-style:italic}
.modelbox{margin-top:14px;border-left:3px solid var(--brand);background:var(--brand-soft);
  border-radius:8px;padding:12px 14px;font-size:14.5px}

/* feedback */
.fb{margin-top:14px;border-radius:12px;padding:13px 14px;font-size:14.5px;font-weight:500;display:none}
.fb.show{display:block}
.fb.ok{background:var(--good-soft);color:var(--good);border:1px solid var(--good)}
.fb.no{background:var(--bad-soft);color:var(--bad);border:1px solid var(--bad)}
.fb .h{font-weight:800;display:block;margin-bottom:3px}
.fb .x{color:var(--ink);font-weight:500}

/* footer action */
.foot{position:sticky;bottom:0;background:linear-gradient(to top,var(--bg) 70%,transparent);
  padding:12px 0 calc(14px + env(safe-area-inset-bottom));display:flex;gap:10px}
.btn{flex:1;padding:15px;border-radius:14px;font-size:16px;font-weight:800;
  background:var(--brand);color:#fff;box-shadow:var(--shadow)}
.btn:active{transform:translateY(1px)}
.btn[disabled]{opacity:.4;cursor:default}
.btn.ghost{background:var(--card);color:var(--ink);border:1px solid var(--line)}
.btn.good{background:var(--good)} .btn.bad{background:var(--bad)}

/* result */
.result{text-align:center;padding:30px 16px}
.result .big{font-size:54px;font-weight:800;margin:8px 0}
.result .ring{width:130px;height:130px;margin:6px auto 14px;border-radius:50%;
  display:grid;place-items:center;font-size:34px;font-weight:800;color:#fff}
.result h2{font-size:22px;margin:4px 0 2px}
.result p{color:var(--muted);margin:4px 0}
.pill{display:inline-block;background:var(--card);border:1px solid var(--line);border-radius:999px;
  padding:7px 14px;font-weight:700;font-size:14px;margin:5px 4px;box-shadow:var(--shadow)}
.hidden{display:none!important}
/* aroma wheel */
.wheelView{width:100%;overflow:hidden;border:1px solid var(--line);border-radius:18px;background:var(--card);box-shadow:var(--shadow);padding:6px}
.wheelView svg{display:block;margin:0 auto;width:100%;max-width:460px;height:auto;touch-action:manipulation}
.seg{cursor:pointer;transition:opacity .15s} .seg.dim{opacity:.22}
.wlabel{font-weight:800;fill:#fff;pointer-events:none}
.wctr{font-weight:800;fill:var(--ink);pointer-events:none;text-anchor:middle}
.wdetail{margin-top:12px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:15px;box-shadow:var(--shadow)}
.wdetail h3{margin:0 0 4px;font-size:17px} .wdetail .cap{font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--brand)}
.wdetail p{margin:6px 0 10px;color:var(--muted);font-size:13.5px}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{font-size:12.5px;font-weight:600;background:var(--bg);border:1px solid var(--line);border-radius:999px;padding:7px 12px;cursor:pointer}
.chip:active{transform:translateY(1px)} .chip.on{background:var(--brand);color:#fff;border-color:var(--brand)}
.whint{font-size:12px;color:var(--muted);text-align:center;margin:10px 0 2px}
.wheelFrame{width:100%;height:80vh;min-height:500px;border:1px solid var(--line);border-radius:16px;background:var(--card);box-shadow:var(--shadow);overflow:hidden;margin-bottom:8px}
.wheelFrame iframe{width:100%;height:100%;border:0;display:block}
.dots{display:inline-flex;gap:3px;vertical-align:middle;margin-left:2px}
.dots i{width:6px;height:6px;border-radius:50%;background:var(--line);display:inline-block}
.dots i.on{background:var(--gold)}
</style>
</head>
<body>
<div class="wrap">
  <!-- HEADER -->
  <header>
    <div class="brand" id="brandTitle"></div>
    <div class="stat" id="streakStat">🔥 0</div>
    <div class="stat" id="xpStat">⭐ 0</div>
    <button class="themebtn" id="themeBtn" aria-label="Hell/Dunkel">🌙</button>
  </header>

  <!-- HOME -->
  <div id="homeView">
    <div class="tabs" id="tabs"></div>
    <div id="bannerSlot"></div>
    <div id="catList"></div>
  </div>

  <!-- QUIZ -->
  <div id="quizView" class="hidden">
    <div class="qhead">
      <button class="back" id="quizBack">‹ Ende</button>
      <div class="pbar"><i id="pbarFill"></i></div>
      <div class="qcount" id="qcount"></div>
    </div>
    <div id="cardSlot"></div>
    <div class="foot" id="footSlot"></div>
  </div>

  <!-- RESULT -->
  <div id="resultView" class="hidden">
    <div class="result">
      <div class="ring" id="resRing"></div>
      <h2 id="resTitle"></h2>
      <p id="resSub"></p>
      <div id="resPills"></div>
    </div>
    <div class="foot">
      <button class="btn ghost" id="resHome">Startseite</button>
      <button class="btn" id="resAgain">Nochmal</button>
    </div>
  </div>
</div>

<script>
"use strict";
const CFG = JSON.parse(document.getElementById('cfg').textContent);
const QUESTIONS = JSON.parse(document.getElementById('qdata').textContent);
QUESTIONS.forEach((q,i)=>{q._i=i;});
const SESSION_LEN = 12;

/* ---------- storage ---------- */
const SK = CFG.storeKey;
function load(){ try{return JSON.parse(localStorage.getItem(SK))||{};}catch(e){return {};} }
function save(){ try{localStorage.setItem(SK, JSON.stringify(store));}catch(e){} }
let store = load();
store.xp = store.xp||0; store.sc = store.sc||0; store.sl = store.sl||"";
store.best = store.best||{};

/* ---------- helpers ---------- */
function $(id){return document.getElementById(id);}
function el(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function sample(a,n){return shuffle(a).slice(0,n);}
function today(){var d=new Date();return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
function yesterday(){var d=new Date();d.setDate(d.getDate()-1);return d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate();}
function norm(s){return (s||"").toString().toLowerCase().trim()
  .replace(/ä/g,"ae").replace(/ö/g,"oe").replace(/ü/g,"ue").replace(/ß/g,"ss")
  .normalize("NFD").replace(/[̀-ͯ]/g,"")
  .replace(/[^a-z0-9]/g,"");}
function lev(a,b){var m=a.length,n=b.length,d=[];for(var i=0;i<=m;i++)d[i]=[i];for(var j=0;j<=n;j++)d[0][j]=j;
  for(i=1;i<=m;i++)for(j=1;j<=n;j++)d[i][j]=Math.min(d[i-1][j]+1,d[i][j-1]+1,d[i-1][j-1]+(a[i-1]===b[j-1]?0:1));return d[m][n];}
const LETTERS="ABCDE";

/* ---------- header ---------- */
function refreshHeader(){
  $('brandTitle').innerHTML = CFG.brand;
  $('streakStat').textContent = "🔥 "+store.sc;
  $('xpStat').textContent = "⭐ "+store.xp;
}
function applyTheme(){
  if(store.theme==='dark'){document.documentElement.setAttribute('data-theme','dark');$('themeBtn').textContent='☀️';}
  else{document.documentElement.removeAttribute('data-theme');$('themeBtn').textContent='🌙';}
}
$('themeBtn').onclick=function(){store.theme=(store.theme==='dark')?'light':'dark';save();applyTheme();
  var v=store.theme==='dark'?'dark':'light';
  document.querySelectorAll('iframe').forEach(function(fr){ if(fr.contentWindow){try{fr.contentWindow.postMessage({type:'aromarad-theme',value:v},'*');}catch(e){}} });};

/* ---------- streak ---------- */
function bumpStreak(){
  var t=today();
  if(store.sl===t){} else if(store.sl===yesterday()){store.sc++;} else {store.sc=1;}
  store.sl=t; save(); refreshHeader();
}

/* ---------- home ---------- */
let curTrack = CFG.tracks[0].id;
function trackColor(id){var t=CFG.tracks.find(function(x){return x.id===id;});return t?t.color:'var(--brand)';}
function catIcon(cat){return (CFG.catIcons&&CFG.catIcons[cat])|| '📖';}

function renderTabs(){
  var w=$('tabs'); w.innerHTML='';
  CFG.tracks.forEach(function(t){
    var b=el('button','tab'+(t.id===curTrack?' on':''), t.emoji+' '+t.label);
    if(t.id===curTrack){b.style.background=t.color;}
    b.onclick=function(){curTrack=t.id;renderHome();};
    w.appendChild(b);
  });
}
function catsOf(track){
  var map={}; var order=[];
  QUESTIONS.forEach(function(q){ if(q.track===track){ if(!map[q.cat]){map[q.cat]=[];order.push(q.cat);} map[q.cat].push(q);} });
  return order.map(function(c){return {cat:c,items:map[c]};});
}
function diffDots(items){
  var avg=items.reduce(function(s,q){return s+(q.d||1);},0)/items.length;
  var n=Math.round(avg); var h='<span class="dots">';
  for(var i=1;i<=3;i++)h+='<i class="'+(i<=n?'on':'')+'"></i>';
  return h+'</span>';
}
function renderHome(){
  $('homeView').classList.remove('hidden');
  $('quizView').classList.add('hidden');
  $('resultView').classList.add('hidden');
  renderTabs();
  var col=trackColor(curTrack);
  var tObj=CFG.tracks.find(function(x){return x.id===curTrack;});
  var pool=QUESTIONS.filter(function(q){return q.track===curTrack;});
  // banner: mixed for this track
  var bs=$('bannerSlot'); bs.innerHTML='';
  var ban=el('div','banner');
  ban.style.background='linear-gradient(135deg,'+col+',color-mix(in srgb,'+col+' 65%, #000))';
  ban.innerHTML='<span class="em">🎲</span><div><b>Alles gemischt</b><small>'+pool.length+' Fragen · '+tObj.label+' · zufällig & gemischt</small></div><span class="go">›</span>';
  ban.onclick=function(){startQuiz(function(q){return q.track===curTrack;}, '🎲 '+tObj.label, col);};
  bs.appendChild(ban);
  // category list
  var list=$('catList'); list.innerHTML='';
  if(tObj.wheel){
    list.appendChild(el('div','sectit','Aromarad — jederzeit zum Nachschlagen'));
    var fr=el('div','wheelFrame');
    var th=(store.theme==='dark')?'dark':'light';
    var ifr=document.createElement('iframe');
    ifr.id='aromaFrame'; ifr.title='Aromarad';
    ifr.setAttribute('src',(CFG.wheelSrc||'aromarad.html')+'?theme='+th);
    fr.appendChild(ifr); list.appendChild(fr);
    return;
  }
  list.appendChild(el('div','sectit','Themen'));
  catsOf(curTrack).forEach(function(g){
    var b=el('button','cat');
    b.innerHTML='<span class="ic">'+catIcon(g.cat)+'</span>'+
      '<span class="tx"><b>'+g.cat+'</b><small>'+g.items.length+' Fragen '+diffDots(g.items)+'</small></span>'+
      '<span class="ct">›</span>';
    b.onclick=function(){startQuiz(function(q){return q.track===curTrack&&q.cat===g.cat;}, g.cat, col);};
    list.appendChild(b);
  });
}

/* ---------- quiz session ---------- */
let S=null;
function startQuiz(filter, label, color){
  var pool=QUESTIONS.filter(filter);
  var queue=sample(pool, Math.min(SESSION_LEN, pool.length));
  S={queue:queue,pos:0,correct:0,xp:0,label:label,color:color||'var(--brand)',filter:filter};
  $('homeView').classList.add('hidden');
  $('resultView').classList.add('hidden');
  $('quizView').classList.remove('hidden');
  renderQ();
}
$('quizBack').onclick=function(){ if(confirm('Quiz beenden und zurück?')) renderHome(); };

function setFoot(buttons){ // buttons: array of {label,cls,fn,disabled}
  var f=$('footSlot'); f.innerHTML='';
  buttons.forEach(function(b){
    var btn=el('button','btn'+(b.cls?' '+b.cls:''), b.label);
    if(b.disabled)btn.disabled=true;
    btn.onclick=b.fn; f.appendChild(btn); b._el=btn;
  });
}
function progress(){
  $('pbarFill').style.width=((S.pos)/S.queue.length*100)+'%';
  $('qcount').textContent=(S.pos+1)+' / '+S.queue.length;
}
function next(){ S.pos++; if(S.pos>=S.queue.length){finish();} else {renderQ();} }
function nextBtn(){ var last=(S.pos+1>=S.queue.length); setFoot([{label:last?'Ergebnis ansehen':'Weiter ›',fn:next}]); }

let answered=false;
function reveal(correct, q, opts){
  if(answered)return; answered=true;
  opts=opts||{};
  var gain=0;
  if(correct){ gain = 10 + ((q.d||1)-1)*5; S.correct++; }
  else if(opts.self){ gain=0; }
  if(opts.self && correct){ gain = 6 + ((q.d||1)-1)*3; }
  S.xp+=gain; store.xp+=gain; save(); refreshHeader();
  // feedback box
  var fb=$('cardFb');
  if(fb){
    fb.className='fb show '+(correct?'ok':'no');
    var head = opts.self ? (correct?'Stark! ✓':'Beim nächsten Mal ✗') : (correct?'Richtig ✓':'Nicht ganz ✗');
    var body = q.fb || opts.body || '';
    fb.innerHTML='<span class="h">'+head+(gain?'  +'+gain+' XP':'')+'</span><span class="x">'+body+'</span>';
  }
  nextBtn();
}

function buildQ(q){
  var k='<span class="kicker t-'+q.ty+'">'+kickerLabel(q.ty)+'</span>';
  var card=el('div','card');
  card.innerHTML=k;
  var qt = q.q || q.front || q.prompt || '';
  if(q.ty!=='flip') card.appendChild(el('div','qtext', qt));
  return card;
}
function kickerLabel(ty){
  return ({mc:'Frage',multi:'Mehrfachauswahl',tf:'Wahr oder Falsch',odd:'Ausreißer finden',
    match:'Zuordnen',order:'Sortieren',gap:'Lückentext',est:'Schätzen',flip:'Lernkarte',recall:'Selbsttest'})[ty]||'Frage';
}

function renderQ(){
  answered=false; progress();
  var q=S.queue[S.pos];
  var slot=$('cardSlot'); slot.innerHTML='';
  var card=buildQ(q);
  slot.appendChild(card);
  var fb=el('div','fb'); fb.id='cardFb'; card.appendChild(fb);
  // type-specific
  if(q.ty==='mc'||q.ty==='odd') renderMC(q,card);
  else if(q.ty==='multi') renderMulti(q,card);
  else if(q.ty==='tf') renderTF(q,card);
  else if(q.ty==='match') renderMatch(q,card);
  else if(q.ty==='order') renderOrder(q,card);
  else if(q.ty==='gap') renderGap(q,card);
  else if(q.ty==='est') renderEst(q,card);
  else if(q.ty==='flip') renderFlip(q,card);
  else if(q.ty==='recall') renderRecall(q,card);
  else { card.appendChild(el('div','qsub','(unbekannter Typ)')); nextBtn(); }
  window.scrollTo(0,0);
}

/* MC + odd */
function renderMC(q,card){
  var wrap=el('div','opts'); card.insertBefore(wrap, $('cardFb'));
  var idx=q.opts.map(function(_,i){return i;});
  var order=shuffle(idx);
  var btns=[];
  order.forEach(function(origIdx,pos){
    var b=el('button','opt');
    b.innerHTML='<span class="k">'+LETTERS[pos]+'</span><span>'+q.opts[origIdx]+'</span>';
    b.onclick=function(){
      if(answered)return;
      var correct = origIdx===q.c;
      btns.forEach(function(o){o.b.disabled=true;});
      b.classList.add(correct?'correct':'wrong');
      if(!correct){ // also show correct one
        btns.forEach(function(o){ if(o.origIdx===q.c) o.b.classList.add('correct'); });
      }
      reveal(correct,q);
    };
    btns.push({b:b,origIdx:origIdx}); wrap.appendChild(b);
  });
  setFoot([{label:'Wähle eine Antwort',fn:function(){},disabled:true}]);
}

/* multi */
function renderMulti(q,card){
  card.insertBefore(el('div','qsub','Mehrere Antworten richtig – wähle alle aus.'), $('cardFb'));
  var wrap=el('div','opts'); card.insertBefore(wrap, $('cardFb'));
  var order=shuffle(q.opts.map(function(_,i){return i;}));
  var sel={};
  var btns=[];
  order.forEach(function(origIdx,pos){
    var b=el('button','opt');
    b.innerHTML='<span class="k">'+LETTERS[pos]+'</span><span>'+q.opts[origIdx]+'</span>';
    b.onclick=function(){ if(answered)return; sel[origIdx]=!sel[origIdx]; b.classList.toggle('sel',sel[origIdx]); updateFoot(); };
    btns.push({b:b,origIdx:origIdx}); wrap.appendChild(b);
  });
  function ready(){return Object.keys(sel).filter(function(k){return sel[k];}).length>0;}
  function updateFoot(){ if(S._mf)S._mf.disabled=!ready(); }
  function check(){
    if(answered)return;
    var picked=Object.keys(sel).filter(function(k){return sel[k];}).map(Number).sort();
    var corr=q.c.slice().sort();
    var ok = picked.length===corr.length && picked.every(function(v,i){return v===corr[i];});
    btns.forEach(function(o){
      var isC=q.c.indexOf(o.origIdx)>=0, isP=!!sel[o.origIdx];
      o.b.disabled=true; o.b.classList.remove('sel');
      if(isC) o.b.classList.add('correct');
      else if(isP) o.b.classList.add('wrong');
    });
    reveal(ok,q);
  }
  setFoot([{label:'Prüfen',fn:check,disabled:true}]); S._mf=$('footSlot').firstChild;
}

/* true/false */
function renderTF(q,card){
  var wrap=el('div','tf'); card.insertBefore(wrap,$('cardFb'));
  [['Wahr','✓',true],['Falsch','✗',false]].forEach(function(o){
    var b=el('button',null,'<span class="e">'+o[1]+'</span>'+o[0]);
    b.onclick=function(){
      if(answered)return;
      var correct = (o[2]===q.a);
      wrap.querySelectorAll('button').forEach(function(x){x.disabled=true;});
      b.classList.add(correct?'correct':'wrong');
      if(!correct){ wrap.querySelectorAll('button')[q.a?0:1].classList.add('correct'); }
      reveal(correct,q);
    };
    wrap.appendChild(b);
  });
  setFoot([{label:'Wahr oder Falsch?',fn:function(){},disabled:true}]);
}

/* match */
function renderMatch(q,card){
  card.insertBefore(el('div','qsub','Tippe links, dann den passenden Partner rechts.'),$('cardFb'));
  var lefts=q.pairs.map(function(p){return p[0];});
  var rights=q.pairs.map(function(p,i){return {txt:p[1],orig:i};});
  var rOrder=shuffle(rights);
  var wrap=el('div','match'); card.insertBefore(wrap,$('cardFb'));
  var lc=el('div','mcol'), rc=el('div','mcol');
  wrap.appendChild(lc); wrap.appendChild(rc);
  var assign={}; // leftIndex -> position in rOrder
  var activeL=null; var lEls=[],rEls=[];
  lefts.forEach(function(t,i){
    var b=el('button','mitem','<span>'+t+'</span>');
    b.onclick=function(){ if(answered)return;
      if(assign[i]!=null){ // clear
        var rp=assign[i]; delete assign[i]; rEls[rp].classList.remove('used'); rEls[rp].dataset.l='';
        b.querySelector('.mbadge')&&b.querySelector('.mbadge').remove(); refresh();
        return;
      }
      activeL=(activeL===i?null:i); refresh();
    };
    lEls.push(b); lc.appendChild(b);
  });
  rOrder.forEach(function(r,p){
    var b=el('button','mitem','<span>'+r.txt+'</span>');
    b.onclick=function(){ if(answered)return; if(activeL==null)return; if(b.classList.contains('used'))return;
      assign[activeL]=p; b.classList.add('used'); b.dataset.l=activeL;
      var badge=lEls[activeL].querySelector('.mbadge'); if(!badge){badge=el('span','mbadge');lEls[activeL].appendChild(badge);}
      badge.textContent=(p+1); var rb=el('span','mbadge');rb.textContent=(p+1);
      // tag right with same number
      b.querySelector('.mbadge')&&b.querySelector('.mbadge').remove(); b.appendChild(rb);
      activeL=null; refresh();
    };
    rEls.push(b); rc.appendChild(b);
  });
  function refresh(){
    lEls.forEach(function(b,i){b.classList.toggle('active',activeL===i);});
    if(S._mf)S._mf.disabled=Object.keys(assign).length<lefts.length;
  }
  function check(){
    if(answered)return; var ok=true;
    lefts.forEach(function(t,i){
      var p=assign[i]; var chosen=rOrder[p]; var correct=chosen&&chosen.orig===i;
      if(!correct)ok=false;
      lEls[i].classList.add(correct?'correct':'wrong');
      lEls[i].disabled=true;
    });
    rEls.forEach(function(b){b.disabled=true;});
    // build answer key in fb
    var key=q.pairs.map(function(p){return '<b>'+p[0]+'</b> → '+p[1];}).join('<br>');
    reveal(ok,q,{body:(q.fb?q.fb+'<br><br>':'')+key});
  }
  setFoot([{label:'Prüfen',fn:check,disabled:true}]); S._mf=$('footSlot').firstChild;
}

/* order */
function renderOrder(q,card){
  card.insertBefore(el('div','qsub','Bringe in die richtige Reihenfolge (▲▼).'),$('cardFb'));
  var arr=shuffle(q.items.map(function(t,i){return {t:t,orig:i};}));
  // ensure not already perfectly sorted
  if(arr.every(function(x,i){return x.orig===i;}) && arr.length>1){ var t=arr[0];arr[0]=arr[1];arr[1]=t; }
  var wrap=el('div','order'); card.insertBefore(wrap,$('cardFb'));
  function draw(){
    wrap.innerHTML='';
    arr.forEach(function(it,i){
      var row=el('div','oitem');
      row.innerHTML='<span class="num">'+(i+1)+'</span><span class="lbl">'+it.t+'</span>';
      var ar=el('div','arrows');
      var up=el('button',null,'▲'), dn=el('button',null,'▼');
      up.disabled=(i===0); dn.disabled=(i===arr.length-1);
      up.onclick=function(){if(answered)return;var t=arr[i];arr[i]=arr[i-1];arr[i-1]=t;draw();};
      dn.onclick=function(){if(answered)return;var t=arr[i];arr[i]=arr[i+1];arr[i+1]=t;draw();};
      ar.appendChild(up);ar.appendChild(dn);row.appendChild(ar);
      wrap.appendChild(row);
    });
  }
  draw();
  function check(){
    if(answered)return; var ok=arr.every(function(x,i){return x.orig===i;});
    wrap.querySelectorAll('.oitem').forEach(function(row,i){
      row.classList.add(arr[i].orig===i?'correct':'wrong');
      row.querySelectorAll('button').forEach(function(b){b.disabled=true;});
    });
    var key='Richtig: '+q.items.map(function(t,i){return (i+1)+'. '+t;}).join(' · ');
    reveal(ok,q,{body:(q.fb?q.fb+'<br><br>':'')+key});
  }
  setFoot([{label:'Prüfen',fn:check}]);
}

/* gap */
function renderGap(q,card){
  var inp=el('input','gapin'); inp.type='text'; inp.placeholder='Antwort eingeben…';
  inp.autocomplete='off'; inp.autocapitalize='off'; inp.spellcheck=false;
  card.insertBefore(inp,$('cardFb'));
  function check(){
    if(answered)return; var v=norm(inp.value);
    if(!v)return;
    var acc=q.a.map(norm);
    var ok = acc.some(function(a){ return a===v || (a.length>4 && lev(a,v)<=1) || (a.length>6 && (v.indexOf(a)>=0||a.indexOf(v)>=0)); });
    inp.disabled=true; inp.style.borderColor=ok?'var(--good)':'var(--bad)';
    inp.style.background=ok?'var(--good-soft)':'var(--bad-soft)';
    reveal(ok,q,{body:(q.fb?q.fb+'<br><br>':'')+'Akzeptiert: <b>'+q.a[0]+'</b>'});
  }
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')check();});
  setTimeout(function(){inp.focus();},100);
  setFoot([{label:'Prüfen',fn:check}]);
}

/* estimate */
function renderEst(q,card){
  var box=el('div','est'); card.insertBefore(box,$('cardFb'));
  var start=Math.round((q.min+q.max)/2/ (q.step||1))*(q.step||1);
  var val=el('div','estval');
  var rng=el('input','estrange'); rng.type='range'; rng.min=q.min;rng.max=q.max;rng.step=q.step||1;rng.value=start;
  function fmt(v){return v+(q.unit?(' '+q.unit):'');}
  val.textContent=fmt(start);
  rng.oninput=function(){val.textContent=fmt(rng.value);};
  var mm=el('div','estminmax','<span>'+fmt(q.min)+'</span><span>'+fmt(q.max)+'</span>');
  box.appendChild(val);box.appendChild(rng);box.appendChild(mm);
  function check(){
    if(answered)return; var v=Number(rng.value); rng.disabled=true;
    var ok=Math.abs(v-q.ans)<=q.tol;
    val.style.color=ok?'var(--good)':'var(--bad)';
    reveal(ok,q,{body:(q.fb?q.fb+'<br><br>':'')+'Deine Schätzung: <b>'+fmt(v)+'</b> · Richtig: <b>'+fmt(q.ans)+'</b> (±'+q.tol+')'});
  }
  setFoot([{label:'Prüfen',fn:check}]);
}

/* flip */
function renderFlip(q,card){
  card.insertBefore(el('div','qsub','Überlege, dann Antwort zeigen:'),$('cardFb'));
  var fc=el('div','flipcard', q.front); card.insertBefore(fc,$('cardFb'));
  function flip(){ fc.innerHTML=q.reveal; fc.style.borderColor='var(--brand)';
    setFoot([{label:'❌ Wusste ich nicht',cls:'ghost',fn:function(){reveal(false,q,{self:true,body:q.reveal});}},
             {label:'✅ Gewusst',cls:'good',fn:function(){reveal(true,q,{self:true,body:q.reveal});}}]);
    try{fc.scrollIntoView({block:'center',behavior:'smooth'});}catch(e){} }
  setFoot([{label:'Antwort zeigen',fn:flip}]);
}

/* recall */
function renderRecall(q,card){
  if(q.hint) card.insertBefore(el('div','hintbox','💡 Tipp: '+q.hint),$('cardFb'));
  function show(){
    var mb=el('div','modelbox','<b>Musterantwort:</b><br>'+q.model); card.insertBefore(mb,$('cardFb'));
    try{mb.scrollIntoView({block:'center',behavior:'smooth'});}catch(e){}
    setFoot([{label:'❌ Wusste ich nicht',cls:'ghost',fn:function(){reveal(false,q,{self:true,body:q.model});}},
             {label:'✅ Gewusst',cls:'good',fn:function(){reveal(true,q,{self:true,body:q.model});}}]);
  }
  setFoot([{label:'Musterantwort zeigen',fn:show}]);
}

/* ---------- result ---------- */
function finish(){
  $('pbarFill').style.width='100%';
  bumpStreak();
  var n=S.queue.length, c=S.correct, pct=Math.round(c/n*100);
  var key=S.label; if((store.best[key]||0)<pct){store.best[key]=pct;save();}
  $('quizView').classList.add('hidden');
  $('resultView').classList.remove('hidden');
  var ring=$('resRing');
  var col = pct>=80?'var(--good)':(pct>=50?'var(--gold)':'var(--bad)');
  ring.style.background='conic-gradient('+col+' '+pct+'%, var(--line) 0)';
  ring.innerHTML='<div style="width:104px;height:104px;border-radius:50%;background:var(--card);display:grid;place-items:center;color:var(--ink);font-size:30px">'+pct+'%</div>';
  var emo = pct>=80?'🏆':(pct>=50?'👍':'📚');
  $('resTitle').textContent = emo+' '+c+' von '+n+' richtig';
  $('resSub').textContent = S.label;
  $('resPills').innerHTML='<span class="pill">+'+S.xp+' XP</span><span class="pill">🔥 '+store.sc+' Tage</span><span class="pill">Bestwert: '+store.best[key]+'%</span>';
  $('resAgain').onclick=function(){startQuiz(S.filter,S.label,S.color);};
  $('resHome').onclick=function(){ renderHome();};
}

/* ---------- floating aromarad button ---------- */
function initWheelFab(){
  if(!CFG.tracks.some(function(t){return t.wheel;})) return;
  var st=document.createElement('style');
  st.textContent='.fab{position:fixed;left:14px;bottom:calc(88px + env(safe-area-inset-bottom));z-index:55;width:52px;height:52px;border-radius:50%;background:var(--brand);color:#fff;font-size:24px;display:grid;place-items:center;box-shadow:0 4px 14px rgba(0,0,0,.3);border:2px solid var(--card)}'
    +'.fab:active{transform:translateY(1px)}'
    +'.fab .fabi{line-height:1;transform:translateY(1px)}'
    +'.sheet{position:fixed;inset:0;z-index:80;background:var(--bg);display:none;flex-direction:column}'
    +'.sheet.on{display:flex}'
    +'.sheetbar{display:flex;align-items:center;gap:10px;padding:calc(10px + env(safe-area-inset-top)) 14px 10px;border-bottom:1px solid var(--line);background:var(--card)}'
    +'.sheetbar b{flex:1;font-weight:800;font-size:16px}'
    +'.sheetbar button{font-size:19px;border:1px solid var(--line);background:var(--bg);color:var(--ink);border-radius:10px;padding:6px 12px}'
    +'.sheet iframe{flex:1;width:100%;border:0;display:block}';
  document.head.appendChild(st);
  document.body.classList.add('has-fab');
  var fab=el('button','fab','<span class="fabi">🎡</span>'); fab.setAttribute('aria-label','Aromarad öffnen');
  var sheet=el('div','sheet');
  var bar=el('div','sheetbar'); var title=el('b',null,'🎡 Aromarad'); var close=el('button',null,'✕'); close.setAttribute('aria-label','Schließen');
  bar.appendChild(title); bar.appendChild(close);
  var ifr=document.createElement('iframe'); ifr.id='aromaFabFrame'; ifr.title='Aromarad';
  sheet.appendChild(bar); sheet.appendChild(ifr);
  document.body.appendChild(fab); document.body.appendChild(sheet);
  fab.onclick=function(){ if(!ifr.getAttribute('src')){ ifr.setAttribute('src',(CFG.wheelSrc||'aromarad.html')+'?theme='+((store.theme==='dark')?'dark':'light')); } sheet.classList.add('on'); };
  close.onclick=function(){ sheet.classList.remove('on'); };
}

/* ---------- init ---------- */
applyTheme(); refreshHeader(); renderHome(); initWheelFab();
</script>

<script id="dl-logic">
(function(){
  if(window.__dlInit)return; window.__dlInit=1;
  var L; try{ L=JSON.parse(document.getElementById('dl-lessons').textContent); }catch(e){ return; }
  function theme(){
    var cs=getComputedStyle(document.body);
    var tab=document.querySelector('#tabs .tab.on')||document.body;
    var a=getComputedStyle(tab).backgroundColor;
    return {bg:cs.backgroundColor||'#fff', fg:cs.color||'#222', acc:(a&&a!=='rgba(0, 0, 0, 0)')?a:'#555'};
  }
  function soft(fg){ return fg==='rgb(255, 255, 255)'?'rgba(255,255,255,.08)':'rgba(0,0,0,.05)'; }
  function buildOverlay(kick,title,icon,data){
    var t=theme();
    var ov=document.createElement('div'); ov.className='dlov'; ov.style.background=t.bg; ov.style.color=t.fg;
    var pts=(data.points||[]).map(function(p,i){
      return "<div class='dlpt' style='background:"+soft(t.fg)+"'><span class='dld' style='background:"+t.acc+"'>"+(i+1)+"</span><span>"+p+"</span></div>";
    }).join('');
    var more=data.more?("<div class='dlmore' style='background:"+soft(t.fg)+"'><b>Gut zu wissen</b>"+data.more+"</div>"):'';
    ov.innerHTML="<div class='dlhead'><div class='dlkick'>"+kick+"</div><div class='dltitle'>"+(icon?icon+' ':'')+title+"</div></div>"
      +"<div class='dlscroll'><div class='dllead'>"+(data.lead||'')+"</div>"+pts+more+"</div>"
      +"<div class='dlfoot'><button class='dlgo' style='background:"+t.acc+"'>Los geht’s →</button><button class='dlskip'>Direkt zu den Fragen</button></div>";
    document.body.appendChild(ov);
    var prevOv=document.body.style.overflow; document.body.style.overflow='hidden';
    function close(){ ov.remove(); document.body.style.overflow=prevOv; }
    ov.querySelector('.dlgo').addEventListener('click',close);
    ov.querySelector('.dlskip').addEventListener('click',close);
    ov.querySelector('.dlscroll').scrollTop=0;
  }
  var lastPick=null;
  function cleanTrack(s){ return String(s||'').replace(/[^\p{L}0-9 .\-]/gu,'').trim(); }
  document.addEventListener('click',function(e){
    var cat=e.target.closest&&e.target.closest('#catList button.cat');
    var ban=e.target.closest&&e.target.closest('#bannerSlot .banner');
    if(!cat&&!ban)return;
    var tabOn=document.querySelector('#tabs .tab.on');
    var track=cleanTrack(tabOn&&tabOn.textContent);
    if(cat){
      var tx=cat.querySelector('.tx');
      var nameEl=tx&&(tx.querySelector('b')||tx.firstElementChild);
      var name=(nameEl?nameEl.textContent:(tx?tx.textContent:'')).replace(/\s*\d+\s*Fragen.*$/,'').trim();
      var ic=cat.querySelector('.ic');
      lastPick={kind:'cat',cat:name,track:track,icon:ic?ic.textContent.trim():'',shown:false};
    } else {
      lastPick={kind:'mixed',cat:null,track:track,icon:'🎲',shown:false};
    }
  },true);
  var qv=document.getElementById('quizView');
  if(!qv)return;
  var wasHidden=qv.classList.contains('hidden');
  function maybeShow(){
    if(!lastPick||lastPick.shown)return;
    var data=null,title='',kick='Lektion';
    if(lastPick.kind==='cat'){ data=L.cats&&L.cats[lastPick.cat]; title=lastPick.cat; }
    else { data=(L.mixed&&L.mixed[lastPick.track])||L.mixedDefault; title='Alles gemischt'; kick='Aufwärmen'; }
    if(!data)return;
    lastPick.shown=true;
    buildOverlay(kick,title,lastPick.icon,data);
  }
  new MutationObserver(function(){ var h=qv.classList.contains('hidden'); if(wasHidden&&!h)maybeShow(); wasHidden=h; })
    .observe(qv,{attributes:true,attributeFilter:['class']});
})();
</script>

<script>
(function(){
 var NURL="https://mvonulmerbach-ship-it.github.io/klassik-nachschlagewerk/"; var HASA=false;
 function theme(){return document.documentElement.getAttribute('data-theme')==='dark'?'dark':'light';}
 function openOv(id,fid,url){var o=document.getElementById(id),f=document.getElementById(fid);f.setAttribute('src',url+'?theme='+theme());o.style.display='flex';document.body.style.overflow='hidden';}
 function close(o){o.style.display='none';document.body.style.overflow='';}
 document.querySelectorAll('.ovlx').forEach(function(b){b.addEventListener('click',function(){close(document.getElementById(b.dataset.c));});});
 document.querySelectorAll('.ovl').forEach(function(o){o.addEventListener('click',function(e){if(e.target===o)close(o);});});
 function makeRow(home){var row=document.createElement('div');row.className='toolrow'+(home?' home':'');
   if(HASA){var a=document.createElement('button');a.className='toolbtn';a.innerHTML='🎡 Aromarad';a.addEventListener('click',function(){openOv('aromaOv','aromaIf','aromarad.html');});row.appendChild(a);}
   var n=document.createElement('button');n.className='toolbtn';n.innerHTML='📖 Nachschlagewerk';n.addEventListener('click',function(){openOv('nswOv','nswIf',NURL);});row.appendChild(n);return row;}
 function injCard(card){if(!card)return;if(!card.querySelector('.toolrow')){var row=makeRow(false);var qt=card.querySelector('.qtext')||card.querySelector('.qhead');if(qt){qt.parentNode.insertBefore(row,qt.nextSibling);}else{card.insertBefore(row,card.firstChild);}}enhanceOrder(card);}
 function injHome(){var hv=document.getElementById('homeView');if(!hv||hv.classList.contains('hidden'))return;if(hv.querySelector('.toolrow'))return;hv.insertBefore(makeRow(true),hv.firstChild);}
 // --- Drag & Drop für Reihenfolge-Fragen (übersetzt in ▲▼-Klicks) ---
 function enhanceOrder(card){
   var wrap=card.querySelector('.order'); if(!wrap||wrap._dnd)return; wrap._dnd=true; wrap.style.touchAction='none';
   var dragging=null;
   function moveTo(text,target){var s=40;while(s-->0){var rows=wrap.querySelectorAll('.oitem');var cur=-1;for(var i=0;i<rows.length;i++){if(rows[i].querySelector('.lbl').textContent===text){cur=i;break;}}if(cur<0||cur===target)break;var b=rows[cur].querySelectorAll('.arrows button');if(cur>target){if(b[0]&&!b[0].disabled)b[0].click();else break;}else{if(b[1]&&!b[1].disabled)b[1].click();else break;}}}
   wrap.addEventListener('pointerdown',function(e){var row=e.target.closest('.oitem');if(!row)return;if(e.target.closest('.arrows'))return;dragging=row;row.setAttribute('data-drag','1');try{wrap.setPointerCapture(e.pointerId);}catch(_){}});
   wrap.addEventListener('pointerup',function(e){if(!dragging)return;var text=dragging.querySelector('.lbl').textContent;var rows=Array.prototype.slice.call(wrap.querySelectorAll('.oitem'));var target=rows.length-1;for(var i=0;i<rows.length;i++){var r=rows[i].getBoundingClientRect();if(e.clientY<r.top+r.height/2){target=i;break;}}dragging.removeAttribute('data-drag');dragging=null;moveTo(text,target);});
   wrap.addEventListener('pointercancel',function(){if(dragging){dragging.removeAttribute('data-drag');dragging=null;}});
 }
 var slot=document.getElementById('cardSlot');
 if(slot){var mo=new MutationObserver(function(){injCard(slot.querySelector('.card'));});mo.observe(slot,{childList:true,subtree:true});injCard(slot.querySelector('.card'));}
 var hv=document.getElementById('homeView');
 if(hv){var mh=new MutationObserver(function(){injHome();});mh.observe(hv,{childList:true});injHome();}
})();
</script>
